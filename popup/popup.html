<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>小说阅读器</title>
  <style>
    :root {
      --color-primary: #667eea;
      --color-secondary: #764ba2;
      --color-bg: #ffffff;
      --color-bg-card: #f8f9fa;
      --color-text: #333333;
      --color-text-secondary: #666666;
      --color-text-placeholder: #999999;
      --color-danger: #e74c3c;
      --color-border: #e0e0e0;
      --radius-popup: 16px;
      --radius-card: 12px;
      --radius-button: 12px;
      --shadow-card: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-button: 0 4px 15px rgba(102,126,234,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
    }

    .popup-container {
      padding: 0;
    }

    .popup-header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      padding: 20px 16px;
      border-radius: var(--radius-popup) var(--radius-popup) 0 0;
    }

    .popup-header h2 {
      font-size: 18px;
      color: #ffffff;
      text-align: center;
      margin: 0;
    }

    .book-list {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 12px;
      padding: 12px 16px;
    }

    .book-list::-webkit-scrollbar {
      width: 6px;
    }

    .book-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .book-list::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      border-radius: 3px;
    }

    .book-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--color-bg-card);
      border-radius: var(--radius-card);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-card);
    }

    .book-item:hover {
      transform: translateX(4px);
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
    }

    .book-info {
      flex: 1;
      overflow: hidden;
    }

    .book-name {
      font-size: 14px;
      color: var(--color-text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .book-meta {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .book-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-placeholder);
      font-size: 14px;
    }

    .actions {
      padding: 0 16px 16px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: var(--radius-button);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: #fff;
      box-shadow: var(--shadow-button);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.5);
    }

    .btn-secondary {
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    .btn-secondary:hover {
      background: var(--color-border);
    }

    .btn-danger {
      background: #fff;
      color: var(--color-danger);
      border: 1px solid var(--color-danger);
    }

    .btn-danger:hover {
      background: var(--color-danger);
      color: #fff;
    }

    .file-input {
      display: none;
    }

    .settings-link {
      display: block;
      text-align: center;
      margin: 12px 16px;
      font-size: 12px;
      color: var(--color-text-secondary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .settings-link:hover {
      color: var(--color-primary);
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 14px;
      color: var(--color-text-placeholder);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: rgba(231, 76, 60, 0.1);
      color: var(--color-danger);
    }

    .confirm-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .confirm-dialog.show {
      display: flex;
    }

    .confirm-box {
      background: var(--color-bg);
      padding: 24px;
      border-radius: var(--radius-card);
      max-width: 280px;
      text-align: center;
      box-shadow: var(--shadow-card);
    }

    .confirm-box h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--color-text);
    }

    .confirm-box p {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 20px;
    }

    .confirm-box .btn-group {
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <h2>📚 小说阅读器</h2>
    </div>

    <div class="book-list" id="bookList">
      <div class="book-empty">暂无书籍，点击下方按钮上传</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="uploadBtn">📂 上传书籍</button>
      <input type="file" id="fileInput" class="file-input" accept=".txt,.txt">
    </div>

    <a class="settings-link" id="settingsLink">⚙ 阅读设置</a>
  </div>

  <!-- 删除确认对话框 -->
  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-box">
      <h3>确认删除</h3>
      <p>确定要删除这本书吗？此操作不可恢复。</p>
      <div class="btn-group">
        <button class="btn btn-secondary" id="cancelDelete">取消</button>
        <button class="btn btn-danger" id="confirmDelete">删除</button>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js" type="module"></script>
  <script src="../shared/zhTables.js" type="module"></script>
  <script src="../shared/constants.js" type="module"></script>
  <script src="../shared/encoding.js" type="module"></script>
  <script src="../shared/storage.js" type="module"></script>
  <script src="../shared/parser.js" type="module"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
