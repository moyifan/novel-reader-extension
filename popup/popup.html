<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>小说阅读器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 400px;
      font-family: 'Source Han Serif SC', '宋体', serif;
      background: #f5f5f5;
      color: #333;
    }

    .popup-container {
      padding: 16px;
    }

    h2 {
      font-size: 18px;
      color: #2c3e50;
      margin-bottom: 16px;
      text-align: center;
    }

    .book-list {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .book-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fff;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .book-item:hover {
      background: #e8f4f8;
    }

    .book-name {
      font-size: 14px;
      color: #333;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .book-meta {
      font-size: 12px;
      color: #888;
      margin-left: 8px;
    }

    .book-empty {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #4CAF50;
      color: #fff;
    }

    .btn-primary:hover {
      background: #45a049;
    }

    .btn-secondary {
      background: #fff;
      color: #666;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #f0f0f0;
    }

    .btn-danger {
      background: #fff;
      color: #dc3545;
      border: 1px solid #dc3545;
    }

    .btn-danger:hover {
      background: #dc3545;
      color: #fff;
    }

    .actions {
      margin-top: 12px;
    }

    .file-input {
      display: none;
    }

    .settings-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      text-decoration: none;
      cursor: pointer;
    }

    .settings-link:hover {
      color: #4CAF50;
    }

    .delete-btn {
      font-size: 12px;
      color: #dc3545;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      margin-left: 8px;
    }

    .delete-btn:hover {
      text-decoration: underline;
    }

    .confirm-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .confirm-dialog.show {
      display: flex;
    }

    .confirm-box {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      max-width: 260px;
      text-align: center;
    }

    .confirm-box h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .confirm-box p {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }

    .confirm-box .btn-group {
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <h2>小说阅读器</h2>

    <div class="book-list" id="bookList">
      <div class="book-empty">暂无书籍，点击下方按钮上传</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="uploadBtn">📂 上传书籍</button>
      <input type="file" id="fileInput" class="file-input" accept=".txt,.txt">
    </div>

    <a class="settings-link" id="settingsLink">⚙ 阅读设置</a>
  </div>

  <!-- 删除确认对话框 -->
  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-box">
      <h3>确认删除</h3>
      <p>确定要删除这本书吗？此操作不可恢复。</p>
      <div class="btn-group">
        <button class="btn btn-secondary" id="cancelDelete">取消</button>
        <button class="btn btn-danger" id="confirmDelete">删除</button>
      </div>
    </div>
  </div>

  <script src="../shared/utils.js" type="module"></script>
  <script src="../shared/zhTables.js" type="module"></script>
  <script src="../shared/constants.js" type="module"></script>
  <script src="../shared/encoding.js" type="module"></script>
  <script src="../shared/storage.js" type="module"></script>
  <script src="../shared/parser.js" type="module"></script>
  <script src="popup.js" type="module"></script>
</body>
</html>
