<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阅读设置</title>
  <style>
    :root {
      --color-primary: #667eea;
      --color-secondary: #764ba2;
      --color-bg: #f8f9fa;
      --color-bg-card: #ffffff;
      --color-border: #e0e0e0;
      --radius-card: 12px;
      --radius-button: 12px;
      --radius-input: 8px;
      --shadow-card: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-button: 0 4px 15px rgba(102,126,234,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--color-bg);
      color: #333;
      padding: 20px;
      min-height: 100vh;
    }

    .settings-header {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      border-radius: var(--radius-card);
      padding: 20px 16px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
    }

    .settings-header h2 {
      font-size: 20px;
      text-align: center;
      color: #ffffff;
      margin: 0;
    }

    .settings-body {
      max-width: 600px;
      margin: 0 auto;
    }

    .settings-section {
      background: var(--color-bg-card);
      border-radius: var(--radius-card);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
    }

    .section-title {
      font-size: 13px;
      color: var(--color-primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: none;
    }

    .setting-item {
      margin-bottom: 12px;
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
      color: #333;
    }

    .setting-label span {
      color: #999;
      font-size: 12px;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-input);
      font-size: 14px;
      background: #fff;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }

    .size-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .size-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-input);
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .size-btn:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .size-value {
      min-width: 50px;
      text-align: center;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: var(--color-border);
      border-radius: 3px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
      cursor: pointer;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .theme-btn {
      height: 40px;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      position: relative;
      transition: all 0.2s ease;
    }

    .theme-btn:hover {
      transform: scale(1.05);
    }

    .theme-btn.active {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(102,126,234,0.3);
    }

    .theme-btn.active::after {
      content: '✓';
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
      color: var(--color-primary);
    }

    .theme-btn[data-skin="缺省皮肤"] { background: #C8E6C9; }
    .theme-btn[data-skin="暗色皮肤"] { background: rgba(0,0,0,0.1); }
    .theme-btn[data-skin="白底黑字"] { background: #fff; color: #000; border-color: #ccc; }
    .theme-btn[data-skin="夜间模式"] { background: #2d2d2d; color: #939392; }
    .theme-btn[data-skin="夜间模式1"] { background: #121212; color: #679; }
    .theme-btn[data-skin="夜间模式2"] { background: #121212; color: #AAAAAA; }
    .theme-btn[data-skin="夜间模式（多看）"] { background: #101819; color: #4A4A4A; }
    .theme-btn[data-skin="橙色背景"] { background: #FEF0E1; }
    .theme-btn[data-skin="绿色背景"] { background: #d8e2c8; }
    .theme-btn[data-skin="绿色背景2"] { background: #CCE8CF; }
    .theme-btn[data-skin="蓝色背景"] { background: #E7F4FE; }
    .theme-btn[data-skin="棕黄背景"] { background: #C2A886; }
    .theme-btn[data-skin="经典皮肤"] { background: #EAEAEE; }
    .theme-btn[data-skin="绿色亮字"] { background: #122814; color: #bbd7bc; }
    .theme-btn[data-skin="图书双层"] { background: #ECE8D7; }

    .radio-group,
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .radio-group label,
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .checkbox-group {
      gap: 16px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-save {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: var(--radius-button);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-button);
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.5);
    }

    .btn-reset {
      padding: 14px 20px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-button);
      background: #fff;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-reset:hover {
      background: #f0f0f0;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(102,126,234,0.5);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .help-text {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="settings-header">
    <h2>阅读设置</h2>
  </div>
  <div class="settings-body">

  <!-- 皮肤主题 -->
  <div class="settings-section">
    <h3 class="section-title">皮肤主题</h3>
    <div class="setting-item">
      <div class="theme-grid" id="skinGrid">
        <button class="theme-btn" data-skin="缺省皮肤">缺省</button>
        <button class="theme-btn" data-skin="暗色皮肤">暗色</button>
        <button class="theme-btn" data-skin="白底黑字">白底</button>
        <button class="theme-btn" data-skin="夜间模式">夜间</button>
        <button class="theme-btn" data-skin="夜间模式1">夜1</button>
        <button class="theme-btn" data-skin="夜间模式2">夜2</button>
        <button class="theme-btn" data-skin="夜间模式（多看）">多看</button>
        <button class="theme-btn" data-skin="橙色背景">橙色</button>
        <button class="theme-btn" data-skin="绿色背景">绿色</button>
        <button class="theme-btn" data-skin="绿色背景2">绿2</button>
        <button class="theme-btn" data-skin="蓝色背景">蓝色</button>
        <button class="theme-btn" data-skin="棕黄背景">棕黄</button>
        <button class="theme-btn" data-skin="经典皮肤">经典</button>
        <button class="theme-btn" data-skin="绿色亮字">绿亮</button>
        <button class="theme-btn" data-skin="图书双层">图书</button>
      </div>
    </div>
    <div class="setting-item">
      <label class="setting-label">自定义 CSS</label>
      <textarea id="extraCss" placeholder="输入自定义 CSS..."></textarea>
    </div>
  </div>

  <!-- 字体排版 -->
  <div class="settings-section">
    <h3 class="section-title">字体排版</h3>
    <div class="setting-item">
      <label class="setting-label">字体</label>
      <select id="fontFamily">
        <option value="Source Han Serif SC">思源宋体</option>
        <option value="宋体">宋体</option>
        <option value="黑体">黑体</option>
        <option value="微软雅黑">微软雅黑</option>
        <option value="楷体">楷体</option>
        <option value="serif">serif</option>
        <option value="sans-serif">sans-serif</option>
      </select>
    </div>
    <div class="setting-item">
      <label class="setting-label">
        字号 <span id="fontSizeDisplay">18px</span>
      </label>
      <div class="size-control">
        <button class="size-btn" id="fontDecrease">-</button>
        <input type="range" id="fontSize" min="14" max="28" value="18">
        <button class="size-btn" id="fontIncrease">+</button>
      </div>
    </div>
    <div class="setting-item">
      <label class="setting-label">
        行高 <span id="lineHeightDisplay">1.8</span>
      </label>
      <input type="range" id="lineHeight" min="1.2" max="2.5" step="0.1" value="1.8">
    </div>
    <div class="setting-item">
      <label class="setting-label">
        段落间距 <span id="paragraphHeightDisplay">1em</span>
      </label>
      <input type="range" id="paragraphHeight" min="0.5" max="2" step="0.1" value="1">
    </div>
    <div class="setting-item">
      <label class="setting-label">内容宽度</label>
      <input type="text" id="contentWidth" value="800px" placeholder="如: 800px, 100%">
    </div>
  </div>

  <!-- 繁简转换 -->
  <div class="settings-section">
    <h3 class="section-title">语言</h3>
    <div class="setting-item">
      <label class="setting-label">繁简转换</label>
      <div class="radio-group">
        <label><input type="radio" name="chineseConversion" value="disable"> 关闭</label>
        <label><input type="radio" name="chineseConversion" value="to-tw"> 转繁体</label>
        <label><input type="radio" name="chineseConversion" value="to-cn"> 转简体</label>
      </div>
    </div>
    <div class="setting-item">
      <label class="setting-label">自定义替换规则</label>
      <textarea id="customReplaceRules" placeholder="每行一条，格式: 原文字=替换文字&#10;示例: b[āà]ng=棒"></textarea>
      <div class="help-text">用于修复拼音字等问题，每行一个规则</div>
    </div>
  </div>

  <!-- 快捷键 -->
  <div class="settings-section">
    <h3 class="section-title">快捷键</h3>
    <div class="setting-item">
      <label class="setting-label">安静模式</label>
      <input type="text" id="quietModeKey" value="q" maxlength="1" style="width:60px;">
    </div>
    <div class="setting-item">
      <label class="setting-label">打开设置</label>
      <input type="text" id="openPreferencesKey" value="s" maxlength="1" style="width:60px;">
    </div>
    <div class="setting-item">
      <label class="setting-label">显示/隐藏目录</label>
      <input type="text" id="hideMenuListKey" value="c" maxlength="1" style="width:60px;">
    </div>
    <div class="setting-item">
      <label class="setting-label">语音朗读</label>
      <input type="text" id="openSpeechKey" value="a" maxlength="1" style="width:60px;">
    </div>
  </div>

  <!-- 语音设置 -->
  <div class="settings-section">
    <h3 class="section-title">语音朗读</h3>
    <div class="setting-item">
      <label class="setting-label">语速 <span id="speechRateDisplay">1</span></label>
      <input type="range" id="speechRate" min="0.5" max="3" step="0.1" value="1">
    </div>
    <div class="setting-item">
      <label class="setting-label">音高 <span id="speechPitchDisplay">1</span></label>
      <input type="range" id="speechPitch" min="0" max="2" step="0.1" value="1">
    </div>
  </div>

  <!-- 界面控制 -->
  <div class="settings-section">
    <h3 class="section-title">界面控制</h3>
    <div class="setting-item">
      <div class="checkbox-group">
        <label><input type="checkbox" id="menuListHidden"> 隐藏左侧目录</label>
        <label><input type="checkbox" id="hidePreferencesButton"> 隐藏设置按钮</label>
      </div>
    </div>
    <div class="setting-item">
      <div class="checkbox-group">
        <label><input type="checkbox" id="dblclickPause" checked> 双击暂停自动滚动</label>
        <label><input type="checkbox" id="scrollAnimate"> 滚动动画</label>
      </div>
    </div>
  </div>

  <!-- 保存按钮 -->
  <div class="btn-row">
    <button class="btn-reset" id="resetBtn">恢复默认</button>
    <button class="btn-save" id="saveBtn">保存设置</button>
  </div>

  <div class="toast" id="toast">设置已保存</div>

  <script src="../shared/utils.js" type="module"></script>
  <script src="../shared/zhTables.js" type="module"></script>
  <script src="../shared/constants.js" type="module"></script>
  <script src="../shared/storage.js" type="module"></script>
  <script src="settings.js" type="module"></script>
</body>
</html>
