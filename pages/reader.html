<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说阅读器</title>
  <link rel="stylesheet" href="reader.css">
</head>
<body data-theme="sepia">
  <!-- 主布局 -->
  <div class="reader-layout">
    <!-- 左侧目录栏 -->
    <aside class="toc-sidebar" id="tocSidebar">
      <div class="toc-header">
        <h3 id="bookTitle">加载中...</h3>
        <button class="close-toc" id="closeToc">×</button>
      </div>
      <ul class="toc-list" id="tocList">
        <!-- 章节列表 -->
      </ul>
    </aside>

    <!-- 主内容区 -->
    <main class="reader-main" id="readerMain">
      <div class="reader-content-wrapper">
        <div id="content" class="chapter-content">
          <!-- 段落内容 -->
        </div>
      </div>
    </main>
  </div>

  <!-- 浮动操作按钮 -->
  <div class="reader-actions">
    <button class="action-btn" id="settingsBtn" title="设置 (s)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
      </div>

  <!-- 设置面板 (整合朗读功能) -->
  <div class="settings-overlay hidden" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h3>阅读设置</h3>
        <button class="close-settings" id="closeSettings">×</button>
      </div>

      <div class="settings-section">
        <h4>外观</h4>
        <div class="settings-group">
          <label>背景颜色</label>
          <div class="theme-buttons">
            <button class="theme-btn active" data-theme="sepia" title="护眼" style="background:#F4ECD8;"></button>
            <button class="theme-btn" data-theme="light" title="白天" style="background:#fff;"></button>
            <button class="theme-btn" data-theme="eye-care" title="深色" style="background:#C8E6C9;"></button>
            <button class="theme-btn" data-theme="dark" title="夜间" style="background:#1A1A1A;"></button>
          </div>
        </div>
        <div class="settings-group">
          <label>字体</label>
          <input type="text" id="fontFamily" placeholder="如：XHei Intel、Source Han Serif SC" value="">
        </div>
        <div class="settings-group">
          <label>字体大小</label>
          <div class="font-size-control">
            <button class="size-btn" id="fontDecrease">-</button>
            <span class="font-size-value" id="fontSizeValue">18px</span>
            <button class="size-btn" id="fontIncrease">+</button>
          </div>
        </div>
        <div class="settings-group">
          <label>行高 <span id="lineHeightValue">1.8</span></label>
          <input type="range" id="lineHeightSlider" min="1.2" max="2.5" step="0.1" value="1.8">
        </div>
      </div>

      <div class="settings-section">
        <h4>朗读</h4>
        <div class="speech-controls">
          <button class="speech-btn" id="speechStart">开始朗读</button>
          <button class="speech-btn" id="speechPause" style="display:none;">暂停</button>
          <button class="speech-btn" id="speechStop" style="display:none;">停止</button>
        </div>
        <div class="speech-info">
          <span id="speechStatus">就绪</span>
        </div>
        <div class="speech-options">
          <label>
            语速: <input type="range" id="speechRate" min="0.5" max="3" step="0.1" value="1">
            <span id="speechRateValue">1</span>
          </label>
          <label>
            音高: <input type="range" id="speechPitch" min="0" max="2" step="0.1" value="1">
            <span id="speechPitchValue">1</span>
          </label>
          <select id="speechVoice">
            <option value="">默认语音</option>
          </select>
        </div>
      </div>

      <div class="settings-section">
        <h4>自动滚动</h4>
        <div class="settings-group">
          <div class="auto-read-options">
            <label><input type="radio" name="autoRead" value="off" checked> 关闭</label>
            <label><input type="radio" name="autoRead" value="30"> 30秒/页</label>
            <label><input type="radio" name="autoRead" value="60"> 60秒/页</label>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <h4>自定义样式</h4>
        <div class="settings-group">
          <textarea id="extraCss" rows="3" placeholder="body { -webkit-text-stroke: 0.5px; }"></textarea>
        </div>
      </div>


      <button class="btn-save" id="saveSettings">保存</button>
    </div>
  </div>

  
  <!-- Toast 提示 -->
  <div class="toast hidden" id="toast">提示信息</div>

  <script src="../shared/utils.js" type="module"></script>
  <script src="../shared/zhTables.js" type="module"></script>
  <script src="../shared/constants.js" type="module"></script>
  <script src="../shared/storage.js" type="module"></script>
  <script src="../shared/parser.js" type="module"></script>
  <script src="reader.js" type="module"></script>
</body>
</html>
